<script>if(typeof gsap==='undefined'){window.gsap={to:function(){},from:function(){},set:function(){},registerPlugin:function(){},utils:{toArray:function(s){return [].slice.call(document.querySelectorAll(s))}}};window.ScrollTrigger={}}</script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #050810;
            --bg-card: rgba(17, 24, 39, 0.9);
            --accent: #00B894;
            --accent-glow: rgba(0,184,148,0.4);
            --text: #e5e7eb;
            --text-muted: #9ca3af;
            --text-heading: #f9fafb;
            --border: rgba(255,255,255,0.1);
            --gradient-1: #00B894;
            --gradient-2: #00967A;
        }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.15;
            animation: orbFloat 30s ease-in-out infinite;
        }
        .orb-1 { width: 700px; height: 700px; background: radial-gradient(circle, rgba(0,184,148,0.3), transparent); top: -300px; left: -200px; }
        .orb-2 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,150,122,0.2), transparent); bottom: -200px; right: -200px; animation-delay: -15s; }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(60px, -40px) scale(1.1) rotate(5deg); }
            66% { transform: translate(-40px, 60px) scale(0.9) rotate(-5deg); }
        }

        .auth-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .auth-container {
            background: var(--bg-card);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            padding: 56px 48px;
            border-radius: 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.6);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-heading);
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .tagline {
            color: var(--text-muted);
            font-size: 14px;
        }

        .tab-container {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 16px;
            margin-bottom: 40px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            color: var(--text-muted);
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            color: white;
            box-shadow: 0 4px 12px rgba(0,184,148,0.3);
        }

        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-heading);
            margin-bottom: 32px;
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-heading);
        }
        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text);
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(0,184,148,0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gradient-2), var(--gradient-1));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn span {
            position: relative;
            z-index: 1;
        }
        .btn:hover::before { opacity: 1; }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0,184,148,0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alt-action {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .alt-action a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .alt-action a:hover {
            color: var(--text-heading);
            text-decoration: underline;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
        }

        .back-link {
            text-align: center;
            margin-top: 32px;
        }
        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .back-link a:hover {
            color: var(--accent);
        }

        @media (max-width: 600px) {
            .auth-container {
                padding: 40px 32px;
            }
            h2 {
                font-size: 26px;
            }
        }
    </style>

<!-- 100K Pathway Branded Page Loader CSS -->
<style id="pk-loader-styles">
  #pk-page-loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0f1e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;opacity:1;transition:opacity .5s ease,visibility .5s ease}
  #pk-page-loader.pk-loaded{opacity:0;visibility:hidden;pointer-events:none}
  .pk-loader-brand{text-align:center;position:relative}
  .pk-loader-100k{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:72px;font-weight:800;color:rgba(255,255,255,.15);letter-spacing:-3px;line-height:1;opacity:0;animation:pkFade100k .7s ease .1s forwards}
  .pk-loader-pathway{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:20px;font-weight:700;color:#00B894;letter-spacing:10px;text-transform:uppercase;margin-top:4px;opacity:0;transform:translateY(8px);animation:pkFadePathway .6s ease .5s forwards}
  .pk-loader-bar-wrap{position:absolute;bottom:0;left:0;width:100%;height:3px}
  .pk-loader-bar{height:100%;background:linear-gradient(90deg,transparent,#00B894,#00d4aa,#00B894,transparent);background-size:300% 100%;animation:pkBarShimmer 1.8s ease-in-out infinite;border-radius:2px}
  .pk-loader-glow{position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(0,184,148,.12) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:pkGlowPulse 2s ease-in-out infinite}
  @keyframes pkFade100k{0%{opacity:0;transform:scale(.92)}100%{opacity:1;transform:scale(1)}}
  @keyframes pkFadePathway{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes pkBarShimmer{0%{background-position:300% 0}100%{background-position:-300% 0}}
  @keyframes pkGlowPulse{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:.8;transform:translate(-50%,-50%) scale(1.3)}}
</style>
</head>
<body>
<!-- 100K Pathway Branded Page Loader -->
<div id="pk-page-loader">
  <div class="pk-loader-glow"></div>
  <div class="pk-loader-brand">
    <div class="pk-loader-100k">100K</div>
    <div class="pk-loader-pathway">Pathway</div>
  </div>
  <div class="pk-loader-bar-wrap"><div class="pk-loader-bar"></div></div>
</div>
    <header class="global-header">
        <nav class="nav-container">
            <a href="index.html" class="nav-logo" aria-label="100K Pathway - Home"><img src="logo.svg" alt="100K Pathway" class="nav-logo-img" width="160" height="32"></a>
            <div class="nav-links">
                <a href="how-it-works" class="nav-link">How It Works</a>
                <a href="pricing" class="nav-link">Pricing</a>

            </div>
            <div class="nav-auth">
                <a href="apply" class="nav-link-primary">Apply</a>
            </div>
        </nav>
    </header>
    
    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="ambient-orb orb-1"></div>
        <div class="ambient-orb orb-2"></div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="logo-section">
                <a href="index.html" class="logo"><img src="logo.svg" alt="100K Pathway" width="160" height="32" style="display:block"></a>
                <div class="tagline">Client Portal — Sign in to your account</div>
            </div>

            <div class="tab-container">
                <button class="tab active" onclick="switchTab('signin')">Sign In</button>

    <script>
        // ── Email verification callback ──────────────────────────────────────
        // When the user clicks the link in their verification email they land on
        // /api/auth/verify-email?token=xxx, which processes the token and
        // redirects back here. We also handle the case where the verify URL
        // points directly to auth.html?token=xxx.
        (async function handleVerifyToken() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            if (!token) return;

            // Remove the token from the URL so a page refresh doesn't re-submit it.
            history.replaceState({}, '', window.location.pathname);

            const errorEl = document.getElementById('error');
            try {
                const result = await window.api.verifyEmail(token);
                if (result.success) {
                    // Show a green success banner then drop into the sign-in tab.
                    errorEl.style.background = 'rgba(0,184,148,0.15)';
                    errorEl.style.borderColor = '#00B894';
                    errorEl.style.color = '#00B894';
                    errorEl.textContent = '✓ Email verified! You can now sign in.';
                    errorEl.style.display = 'block';
                } else {
                    errorEl.textContent = result.error || 'Verification failed. The link may have expired.';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Verification request failed. Please try again.';
                errorEl.style.display = 'block';
            }
        })();

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            document.getElementById('error').style.display = 'none';
            
            if (tab === 'signin') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('signin-form').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('signup-form').classList.add('active');
            }
        }

        document.getElementById('signin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;
            
            const submitBtn = e.target.querySelector('.btn span');
            const btn = e.target.querySelector('.btn');
            btn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            
            try {
                const result = await window.api.signin(email, password);
                
                if (result.success) {
                    localStorage.setItem('userRole', result.data.user.role || 'user');
                    localStorage.setItem('userName', result.data.user.full_name);
                    window.location.href = result.data.user.role === 'admin' ? 'admin-dashboard.html' : 'dashboard.html';
                } else {
                    document.getElementById('error').textContent = result.error || 'Invalid credentials';
                    document.getElementById('error').style.display = 'block';
                }
            } catch (error) {
                console.error('Sign in error:', error);
                document.getElementById('error').textContent = 'Error signing in. Please try again.';
                document.getElementById('error').style.display = 'block';
            } finally {
                btn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            
            const submitBtn = e.target.querySelector('.btn span');
            const btn = e.target.querySelector('.btn');
            btn.disabled = true;
            submitBtn.textContent = 'Creating account...';
            
            try {
                const result = await window.api.signup(email, password, name);
                
                if (result.success) {
                    alert('Account created successfully! Check your email to verify your account before signing in.');
                    switchTab('signin');
                    document.getElementById('signin-email').value = email;
                } else {
                    document.getElementById('error').textContent = result.error || 'Registration failed';
                    document.getElementById('error').style.display = 'block';
                }
            } catch (error) {
                console.error('Signup error:', error);
                document.getElementById('error').textContent = 'Error creating account. Please try again.';
                document.getElementById('error').style.display = 'block';
            } finally {
                btn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });

        // Parallax Orbs
        document.addEventListener('mousemove', e => {
            const orbs = document.querySelectorAll('.ambient-orb');
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            
            orbs.forEach((orb, i) => {
                const speed = (i + 1) * 20;
                orb.style.transform = `translate(${x * speed}px, ${y * speed}px) scale(1) rotate(0deg)`;
            });
        });

        // Initial animation
        gsap.from('.auth-container', {
            opacity: 0,
            y: 40,
            duration: 0.8,
            ease: 'power3.out',
            delay: 0.2
        });
    </script>

<!-- 100K Pathway Loader Dismiss Script -->
<script id="pk-loader-script">

</script>
