<svg width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Geometric mark: Upward path symbolizing career trajectory -->
  <path d="M8 32 L8 20 L14 14 L20 8 L26 14 L32 8" stroke="url(#gradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="32" cy="8" r="3" fill="url(#gradient)"/>
  
  <!-- 100K text -->
  <text x="42" y="26" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="20" fill="#0B3B76" letter-spacing="-0.5">100K</text>
  
  <!-- PATHWAY text -->
  <text x="88" y="26" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="20" fill="#667EEA" letter-spacing="0.5">Pathway</text>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667EEA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764BA2;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
