<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background -->
  <rect width="40" height="40" rx="10" fill="rgba(0,184,148,0.1)"/>
  <!-- Upward path: career trajectory -->
  <path d="M9 30 L16 20 L22 24.5 L31 10" stroke="#00B894" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Goal marker at top right -->
  <circle cx="31" cy="10" r="4" fill="#00B894"/>
  <!-- Start marker at bottom left -->
  <circle cx="9" cy="30" r="2.5" fill="rgba(0,184,148,0.5)" stroke="#00B894" stroke-width="1.5"/>
  <!-- Subtle grid dots for depth -->
  <circle cx="16" cy="20" r="1.5" fill="rgba(0,184,148,0.7)"/>
  <circle cx="22" cy="24.5" r="1.5" fill="rgba(0,184,148,0.7)"/>
</svg>
